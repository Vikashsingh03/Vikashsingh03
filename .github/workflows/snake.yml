name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 👇 STEP 1: Repo checkout (VERY IMPORTANT)
      - name: Checkout repo
        uses: actions/checkout@v4

      # 👇 STEP 2: Generate snake
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Vikashsingh03
          outputs: dist/github-contribution-grid-snake.svg

      # 👇 STEP 3: Deploy to output branch
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
